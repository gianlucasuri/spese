<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Spese</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e11;--surface:#18181c;--surface2:#222228;--border:#2e2e38;
  --accent:#c8f060;--accent2:#f06060;--accent3:#60b8f0;
  --text:#f0ede8;--muted:#7a7a8a;--radius:18px;
}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100dvh;overflow-x:hidden}

/* AUTH */
#auth-screen{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:36px 28px;width:100%;max-width:400px}
.auth-logo{font-family:'DM Serif Display',serif;font-size:2rem;margin-bottom:4px}
.auth-logo span{color:var(--accent)}
.auth-sub{color:var(--muted);font-size:.88rem;margin-bottom:32px}
.auth-tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:24px;background:var(--surface2);border-radius:12px;padding:4px}
.auth-tab{border:none;background:transparent;color:var(--muted);padding:10px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .2s}
.auth-tab.active{background:var(--accent);color:#0e0e11}
.afield{margin-bottom:16px}
.afield label{display:block;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:7px}
.afield input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:11px;color:var(--text);padding:13px 15px;font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s;-webkit-appearance:none}
.afield input:focus{border-color:var(--accent)}
.auth-btn{width:100%;background:var(--accent);color:#0e0e11;border:none;border-radius:12px;padding:15px;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px}
.auth-btn:hover{background:#d8ff70;transform:translateY(-1px)}
.auth-err{font-size:.8rem;margin-top:12px;text-align:center;min-height:18px;color:var(--accent2)}
.auth-err.ok{color:var(--accent)}

/* APP */
#app-screen{display:none}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(14,14,17,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:13px 18px;gap:10px}
.logo{font-family:'DM Serif Display',serif;font-size:1.25rem;flex-shrink:0}
.logo span{color:var(--accent)}
.nav-tabs{display:flex;gap:3px;background:var(--surface);border-radius:999px;padding:4px}
.nav-tab{border:none;background:transparent;color:var(--muted);padding:7px 13px;border-radius:999px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.nav-tab.active{background:var(--accent);color:#0e0e11}
.logout-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:7px 11px;border-radius:999px;font-family:'DM Sans',sans-serif;font-size:.75rem;cursor:pointer;transition:all .2s;flex-shrink:0}
.logout-btn:hover{border-color:var(--accent2);color:var(--accent2)}
main{padding-top:74px;max-width:900px;margin:0 auto;padding-bottom:48px}
.view{display:none;padding:20px 16px}
.view.active{display:block}
.spinner-wrap{text-align:center;padding:60px 20px;color:var(--muted)}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
@media(max-width:600px){.cards{grid-template-columns:1fr 1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 16px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:-30px;right:-30px;width:80px;height:80px;border-radius:50%;opacity:.08}
.card.red::before{background:var(--accent2)}.card.green::before{background:var(--accent)}.card.blue::before{background:var(--accent3)}
.card-label{font-size:.7rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.card-value{font-family:'DM Serif Display',serif;font-size:1.65rem;line-height:1}
.card.red .card-value{color:var(--accent2)}.card.green .card-value{color:var(--accent)}.card.blue .card-value{color:var(--accent3)}
.card-sub{font-size:.7rem;color:var(--muted);margin-top:4px}

/* CHARTS */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
@media(max-width:640px){.charts-row{grid-template-columns:1fr}}
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.chart-title{font-size:.74rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:14px}
.chart-box canvas{max-height:200px}

/* TX LIST */
.section-title{font-size:.74rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:12px}
.tx-list{display:flex;flex-direction:column;gap:8px}
.tx-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 15px;display:flex;align-items:center;gap:12px;transition:border-color .2s;animation:fadeUp .2s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.tx-item:hover{border-color:#44444f}
.tx-emoji{width:38px;height:38px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-name{font-weight:500;font-size:.87rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:.71rem;color:var(--muted);margin-top:2px}
.tx-amount{font-family:'DM Serif Display',serif;font-size:1.05rem;flex-shrink:0}
.tx-amount.out{color:var(--accent2)}.tx-amount.in{color:var(--accent)}
.tx-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;padding:5px;opacity:0;transition:opacity .2s;flex-shrink:0}
.tx-item:hover .tx-del{opacity:1}
@media(hover:none){.tx-del{opacity:.4}}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:2.6rem;margin-bottom:12px}
.empty p{font-size:.87rem;line-height:1.6}

/* FORM */
.form-wrap{max-width:480px;margin:0 auto}
.form-title{font-family:'DM Serif Display',serif;font-size:1.9rem;margin-bottom:5px}
.form-sub{color:var(--muted);font-size:.87rem;margin-bottom:26px}
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px}
.type-btn{border:2px solid var(--border);background:var(--surface);color:var(--muted);padding:14px;border-radius:13px;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}
.type-btn.active-out{border-color:var(--accent2);color:var(--accent2);background:rgba(240,96,96,.08)}
.type-btn.active-in{border-color:var(--accent);color:var(--accent);background:rgba(200,240,96,.08)}
.ffield{margin-bottom:18px}
.ffield label{display:block;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px}
.ffield input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:13px 15px;font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.ffield input:focus{border-color:var(--accent)}
.ffield input::placeholder{color:var(--muted)}
.amount-wrap{position:relative}
.amount-sym{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--muted)}
.amount-inp{padding-left:34px!important;font-family:'DM Serif Display',serif!important;font-size:1.4rem!important}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:400px){.frow{grid-template-columns:1fr}}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
@media(max-width:400px){.cat-grid{grid-template-columns:repeat(3,1fr)}}
.cat-btn{border:1.5px solid var(--border);background:var(--surface);border-radius:11px;padding:9px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .2s}
.cat-btn:hover{border-color:#44444f}
.cat-btn.sel{border-color:var(--accent);background:rgba(200,240,96,.08)}
.cat-icon{font-size:1.15rem}
.cat-name{font-size:.58rem;color:var(--muted);text-align:center}
.cat-btn.sel .cat-name{color:var(--accent)}
.submit-btn{width:100%;background:var(--accent);color:#0e0e11;border:none;border-radius:13px;padding:16px;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s}
.submit-btn:hover{background:#d8ff70;transform:translateY(-1px)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* FILTERS */
.filter-row{display:flex;gap:7px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.filter-row::-webkit-scrollbar{display:none}
.fchip{border:1.5px solid var(--border);background:var(--surface);color:var(--muted);padding:6px 13px;border-radius:999px;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s}
.fchip.active{border-color:var(--accent);color:var(--accent);background:rgba(200,240,96,.08)}

/* MONTH NAV */
.month-nav{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.month-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:border-color .2s}
.month-btn:hover{border-color:var(--accent)}
.month-label{font-family:'DM Serif Display',serif;font-size:1.2rem}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#0e0e11;padding:11px 22px;border-radius:999px;font-weight:600;font-size:.82rem;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.err{background:var(--accent2);color:#fff}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">spese<span>.</span></div>
    <div class="auth-sub">Tieni traccia di ogni euro</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Accedi</button>
      <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Registrati</button>
    </div>
    <div id="pane-login">
      <div class="afield"><label>Email</label><input type="email" id="l-email" placeholder="tu@email.com" inputmode="email"></div>
      <div class="afield"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="auth-btn" onclick="doLogin()">Entra →</button>
    </div>
    <div id="pane-signup" style="display:none">
      <div class="afield"><label>Email</label><input type="email" id="s-email" placeholder="tu@email.com" inputmode="email"></div>
      <div class="afield"><label>Password</label><input type="password" id="s-pass" placeholder="min. 6 caratteri" onkeydown="if(event.key==='Enter')doSignup()"></div>
      <button class="auth-btn" onclick="doSignup()">Crea account →</button>
    </div>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <nav>
    <div class="logo">spese<span>.</span></div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showView('dashboard')">Dashboard</button>
      <button class="nav-tab" onclick="showView('form')">+ Aggiungi</button>
      <button class="nav-tab" onclick="showView('lista')">Lista</button>
    </div>
    <button class="logout-btn" onclick="doLogout()">Esci</button>
  </nav>
  <main>
    <!-- DASHBOARD -->
    <div class="view active" id="view-dashboard">
      <div class="month-nav">
        <button class="month-btn" onclick="changeMonth(-1)">‹</button>
        <div class="month-label" id="month-label">—</div>
        <button class="month-btn" onclick="changeMonth(1)">›</button>
      </div>
      <div class="cards">
        <div class="card red"><div class="card-label">Uscite</div><div class="card-value" id="s-out">€0</div><div class="card-sub" id="s-out-n">0 transazioni</div></div>
        <div class="card green"><div class="card-label">Entrate</div><div class="card-value" id="s-in">€0</div><div class="card-sub" id="s-in-n">0 transazioni</div></div>
        <div class="card blue"><div class="card-label">Saldo</div><div class="card-value" id="s-bal">€0</div><div class="card-sub">netto del mese</div></div>
      </div>
      <div class="charts-row">
        <div class="chart-box"><div class="chart-title">Per categoria</div><canvas id="chart-cat"></canvas></div>
        <div class="chart-box"><div class="chart-title">Andamento</div><canvas id="chart-daily"></canvas></div>
      </div>
      <div class="section-title">Ultime transazioni</div>
      <div class="tx-list" id="recent-list"><div class="spinner-wrap"><div class="spinner"></div>Caricamento...</div></div>
    </div>

    <!-- FORM -->
    <div class="view" id="view-form">
      <div class="form-wrap">
        <div class="form-title">Nuova voce</div>
        <div class="form-sub">Inserisci i dettagli della transazione</div>
        <div class="type-toggle">
          <button class="type-btn active-out" id="btn-out" onclick="setType('out')">↑ Uscita</button>
          <button class="type-btn" id="btn-in" onclick="setType('in')">↓ Entrata</button>
        </div>
        <div class="ffield"><label>Importo</label>
          <div class="amount-wrap"><span class="amount-sym">€</span>
            <input class="amount-inp" type="number" id="f-amount" placeholder="0.00" inputmode="decimal" step="0.01" min="0">
          </div>
        </div>
        <div class="ffield"><label>Descrizione</label><input type="text" id="f-desc" placeholder="Es. Spesa al supermercato"></div>
        <div class="ffield"><label>Categoria</label><div class="cat-grid" id="cat-grid"></div></div>
        <div class="frow">
          <div class="ffield"><label>Data</label><input type="date" id="f-date"></div>
          <div class="ffield"><label>Note (opz.)</label><input type="text" id="f-note" placeholder="..."></div>
        </div>
        <button class="submit-btn" id="sub-btn" onclick="addTx()">Aggiungi transazione</button>
      </div>
    </div>

    <!-- LISTA -->
    <div class="view" id="view-lista">
      <div class="filter-row" id="filter-row"></div>
      <div class="tx-list" id="full-list"></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const {createClient} = supabase;
const sb = createClient(
  'https://zhhfecqqahzwjfcypuve.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpoaGZlY3FxYWh6d2pmY3lwdXZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzgxMTYsImV4cCI6MjA4ODE1NDExNn0._stjaIPjNUNG8XhOrysTjnNCGAWy__hoEWf6ZS_KQyE'
);

const CATS=[
  {id:'food',icon:'🛒',name:'Spesa'},{id:'eat',icon:'🍽️',name:'Ristorante'},
  {id:'transport',icon:'🚗',name:'Trasporti'},{id:'home',icon:'🏠',name:'Casa'},
  {id:'health',icon:'💊',name:'Salute'},{id:'fun',icon:'🎉',name:'Svago'},
  {id:'sport',icon:'🏋️',name:'Sport'},{id:'clothes',icon:'👗',name:'Vestiti'},
  {id:'tech',icon:'💻',name:'Tech'},{id:'travel',icon:'✈️',name:'Viaggi'},
  {id:'work',icon:'💼',name:'Lavoro'},{id:'other',icon:'📦',name:'Altro'},
];
const MONTHS=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const COLORS=['#c8f060','#f06060','#60b8f0','#f0b860','#b060f0','#60f0b8','#f060b8','#7bf060','#f0f060','#6080f0','#f09060','#60d0f0'];

let txType='out', selCat='food', activeFilter='all';
let cur={y:new Date().getFullYear(),m:new Date().getMonth()};
let chartCat=null,chartDaily=null,allTx=[];

const catBy=id=>CATS.find(c=>c.id===id)||CATS[CATS.length-1];
const fmt=n=>'€'+Math.abs(n).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2});
const txN=n=>n+' transazion'+(n===1?'e':'i');

function toast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(err?' err':'');
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);
}

/* AUTH */
function switchTab(t){
  document.getElementById('pane-login').style.display=t==='login'?'block':'none';
  document.getElementById('pane-signup').style.display=t==='signup'?'block':'none';
  document.getElementById('tab-login').className='auth-tab'+(t==='login'?' active':'');
  document.getElementById('tab-signup').className='auth-tab'+(t==='signup'?' active':'');
  document.getElementById('auth-err').textContent='';
}
function authErr(msg,ok=false){const e=document.getElementById('auth-err');e.className='auth-err'+(ok?' ok':'');e.textContent=msg;}
function tradErr(m){
  if(m.includes('Invalid login'))return 'Email o password non corretti';
  if(m.includes('already registered'))return 'Email già registrata';
  if(m.includes('valid email'))return 'Email non valida';
  return m;
}
async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  authErr('');
  if(!email||!pass){authErr('Compila tutti i campi');return;}
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error)authErr(tradErr(error.message));
}
async function doSignup(){
  const email=document.getElementById('s-email').value.trim();
  const pass=document.getElementById('s-pass').value;
  authErr('');
  if(!email||!pass){authErr('Compila tutti i campi');return;}
  if(pass.length<6){authErr('Password di almeno 6 caratteri');return;}
  const {error}=await sb.auth.signUp({email,password:pass});
  if(error)authErr(tradErr(error.message));
  else authErr('✓ Controlla la email per confermare l\'account!',true);
}
async function doLogout(){
  await sb.auth.signOut();
  document.getElementById('app-screen').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
  allTx=[];
}

/* SESSION */
sb.auth.onAuthStateChange((event,session)=>{
  if(session){
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app-screen').style.display='block';
    loadData();
  }
});

/* DATA */
async function loadData(){
  const {data,error}=await sb.from('transactions').select('*').order('date',{ascending:false});
  if(error){toast('Errore caricamento',true);return;}
  allTx=data||[];
  renderAll();
}

async function addTx(){
  const amount=parseFloat(document.getElementById('f-amount').value);
  const desc=document.getElementById('f-desc').value.trim();
  const date=document.getElementById('f-date').value;
  const note=document.getElementById('f-note').value.trim();
  if(!amount||amount<=0){toast('⚠️ Importo non valido',true);return;}
  if(!desc){toast('⚠️ Aggiungi una descrizione',true);return;}
  if(!date){toast('⚠️ Seleziona una data',true);return;}
  const btn=document.getElementById('sub-btn');
  btn.disabled=true;btn.textContent='Salvataggio...';
  const {data:{user}}=await sb.auth.getUser();
  const {data,error}=await sb.from('transactions').insert({
    user_id:user.id,type:txType,amount,description:desc,category:selCat,date,note:note||null
  }).select().single();
  btn.disabled=false;btn.textContent='Aggiungi transazione';
  if(error){toast('Errore: '+error.message,true);return;}
  allTx.unshift(data);
  document.getElementById('f-amount').value='';
  document.getElementById('f-desc').value='';
  document.getElementById('f-note').value='';
  toast('✓ Transazione aggiunta!');
  setTimeout(()=>showView('dashboard'),700);
}

async function deleteTx(id){
  const {error}=await sb.from('transactions').delete().eq('id',id);
  if(error){toast('Errore eliminazione',true);return;}
  allTx=allTx.filter(t=>t.id!==id);
  renderAll();toast('🗑 Eliminata');
}

/* RENDER */
function byMonth(txs){
  return txs.filter(t=>{const d=new Date(t.date);return d.getFullYear()===cur.y&&d.getMonth()===cur.m;});
}

function txItem(tx){
  const c=catBy(tx.category);
  const cls=tx.type==='out'?'out':'in';
  const sign=tx.type==='out'?'-':'+';
  return`<div class="tx-item">
    <div class="tx-emoji">${c.icon}</div>
    <div class="tx-info">
      <div class="tx-name">${tx.description}</div>
      <div class="tx-meta">${c.name} · ${new Date(tx.date).toLocaleDateString('it-IT')}${tx.note?' · '+tx.note:''}</div>
    </div>
    <div class="tx-amount ${cls}">${sign}${fmt(tx.amount)}</div>
    <button class="tx-del" onclick="deleteTx(${tx.id})">✕</button>
  </div>`;
}

function renderDash(){
  const month=byMonth(allTx);
  const outs=month.filter(t=>t.type==='out');
  const ins=month.filter(t=>t.type==='in');
  const totOut=outs.reduce((s,t)=>s+Number(t.amount),0);
  const totIn=ins.reduce((s,t)=>s+Number(t.amount),0);
  const bal=totIn-totOut;
  document.getElementById('s-out').textContent=fmt(totOut);
  document.getElementById('s-in').textContent=fmt(totIn);
  document.getElementById('s-bal').textContent=(bal>=0?'+':'−')+fmt(bal);
  document.getElementById('s-bal').style.color=bal>=0?'var(--accent)':'var(--accent2)';
  document.getElementById('s-out-n').textContent=txN(outs.length);
  document.getElementById('s-in-n').textContent=txN(ins.length);
  document.getElementById('month-label').textContent=MONTHS[cur.m]+' '+cur.y;
  const recent=month.slice(0,5);
  document.getElementById('recent-list').innerHTML=recent.length?recent.map(txItem).join('')
    :`<div class="empty"><div class="empty-icon">💸</div><p>Nessuna transazione questo mese.<br>Premi <strong>+ Aggiungi</strong> per iniziare.</p></div>`;
  renderCharts(month);
}

function renderCharts(month){
  const outs=month.filter(t=>t.type==='out');
  const ct={};
  outs.forEach(t=>{ct[t.category]=(ct[t.category]||0)+Number(t.amount);});
  if(chartCat)chartCat.destroy();
  chartCat=new Chart(document.getElementById('chart-cat'),{
    type:'doughnut',
    data:{labels:Object.keys(ct).map(id=>catBy(id).icon+' '+catBy(id).name),
      datasets:[{data:Object.values(ct),backgroundColor:COLORS,borderWidth:0,hoverOffset:5}]},
    options:{responsive:true,maintainAspectRatio:true,cutout:'65%',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.parsed)}}}}
  });
  const days=new Date(cur.y,cur.m+1,0).getDate();
  const daily=Array(days).fill(0);
  outs.forEach(t=>{const d=new Date(t.date).getDate()-1;if(d>=0&&d<days)daily[d]+=Number(t.amount);});
  if(chartDaily)chartDaily.destroy();
  chartDaily=new Chart(document.getElementById('chart-daily'),{
    type:'bar',
    data:{labels:Array.from({length:days},(_,i)=>i+1),
      datasets:[{data:daily,backgroundColor:'rgba(240,96,96,.5)',borderRadius:4,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:true,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.parsed.y)}}},
      scales:{
        x:{ticks:{color:'#7a7a8a',font:{size:9},maxTicksLimit:10},grid:{display:false},border:{display:false}},
        y:{ticks:{color:'#7a7a8a',font:{size:9}},grid:{color:'rgba(255,255,255,.05)'},border:{display:false}}
      }}
  });
}

function renderLista(){
  const cats=[...new Set(allTx.map(t=>t.category))];
  document.getElementById('filter-row').innerHTML=
    `<button class="fchip${activeFilter==='all'?' active':''}" onclick="setFilter('all')">Tutti</button>`
    +`<button class="fchip${activeFilter==='out'?' active':''}" onclick="setFilter('out')">Uscite</button>`
    +`<button class="fchip${activeFilter==='in'?' active':''}" onclick="setFilter('in')">Entrate</button>`
    +cats.map(id=>{const c=catBy(id);return`<button class="fchip${activeFilter===id?' active':''}" onclick="setFilter('${id}')">${c.icon} ${c.name}</button>`;}).join('');
  let fl=[...allTx];
  if(activeFilter==='out')fl=fl.filter(t=>t.type==='out');
  else if(activeFilter==='in')fl=fl.filter(t=>t.type==='in');
  else if(activeFilter!=='all')fl=fl.filter(t=>t.category===activeFilter);
  document.getElementById('full-list').innerHTML=fl.length?fl.map(txItem).join('')
    :`<div class="empty"><div class="empty-icon">🔍</div><p>Nessuna transazione trovata.</p></div>`;
}

function renderAll(){renderDash();renderLista();}
function setFilter(f){activeFilter=f;renderAll();}
function changeMonth(d){
  cur.m+=d;
  if(cur.m>11){cur.m=0;cur.y++;}
  if(cur.m<0){cur.m=11;cur.y--;}
  renderAll();
}
function setType(t){
  txType=t;
  document.getElementById('btn-out').className='type-btn'+(t==='out'?' active-out':'');
  document.getElementById('btn-in').className='type-btn'+(t==='in'?' active-in':'');
}
function selCategory(id){
  selCat=id;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('sel'));
  document.querySelector(`.cat-btn[data-id="${id}"]`).classList.add('sel');
}
function showView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  document.querySelectorAll('.nav-tab')[{dashboard:0,form:1,lista:2}[id]].classList.add('active');
  window.scrollTo(0,0);
}

/* INIT */
document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
document.getElementById('cat-grid').innerHTML=CATS.map(c=>
  `<button class="cat-btn${c.id===selCat?' sel':''}" data-id="${c.id}" onclick="selCategory('${c.id}')">
    <span class="cat-icon">${c.icon}</span><span class="cat-name">${c.name}</span>
  </button>`).join('');
</script>
</body>
</html>
